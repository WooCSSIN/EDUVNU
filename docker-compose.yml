#      interval: 10s
#      timeout: 5s
#      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
    # Lệnh Gunicorn khởi chạy thông qua web server chuẩn Production
    command: sh -c "python manage.py makemigrations && python manage.py migrate && gunicorn --workers 4 --timeout 120 --bind 0.0.0.0:8000 core.wsgi:application"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=host.docker.internal\KMS
      - DB_NAME=Courses
      - DB_USER=sa
      - DB_PASSWORD=Nguyenvu@260405  # Thay mật khẩu sa của máy bạn vào đây
      - DB_PORT=1433
      - CELERY_BROKER_URL=redis://redis:6379/1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

  celery_worker:
    build:
      context: ./backend
    command: celery -A core worker -l info --pool=prefork --concurrency=4
    volumes:
      - ./backend:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - DB_HOST=host.docker.internal\KMS
      - DB_NAME=Courses
      - DB_USER=sa
      - DB_PASSWORD=Nguyenvu@260405
      - DB_PORT=1433
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - backend

  celery_beat:
    build:
      context: ./backend
    command: celery -A core beat -l info
    volumes:
      - ./backend:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - DB_HOST=host.docker.internal\KMS
      - DB_NAME=Courses
      - DB_USER=sa
      - DB_PASSWORD=Nguyenvu@260405
      - DB_PORT=1433
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mssql-data:
